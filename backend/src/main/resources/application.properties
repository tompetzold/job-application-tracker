spring.application.name=bewerbungstracker

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bewerbungstracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres123}

# Schema automatisch beim Start ausführen
spring.sql.init.mode=always

# Server
server.port=8080
